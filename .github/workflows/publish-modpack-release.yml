name: Publish Modpack Release

on:
  push:
    branches:
      - main
    paths:
      - 'modpack/**'

  pull_request:
    paths:
      - 'modpack/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.check_version.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Packwiz
        run: |
          curl -fsSL https://nightly.link/packwiz/packwiz/workflows/go/main/Linux%2064-bit%20x86.zip -o packwiz.zip
          unzip -q packwiz.zip
          chmod +x packwiz
          mv packwiz /usr/local/bin/
          rm packwiz.zip

      - name: Read version from pack.toml
        id: version
        working-directory: modpack
        run: |
          VERSION=$(grep -E '^version\s*=' pack.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version bump
        id: check_version
        working-directory: modpack
        run: |
          PREV_VERSION=$(git show HEAD~1:modpack/pack.toml 2>/dev/null | grep -E '^version\s*=' | sed -E 's/version\s*=\s*"([^"]+)"/\1/' || echo '')
          CURR_VERSION="${{ steps.version.outputs.version }}"
          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Export modpack
        working-directory: modpack
        run: |
          packwiz mr export -o install.mrpack && mv install.mrpack cobblemon-conquest_${{ steps.version.outputs.version }}_modrinth.mrpack
          packwiz curseforge export -o install.zip && mv install.zip cobblemon-conquest_${{ steps.version.outputs.version }}_curseforge.zip

      - name: Upload modpack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-releases
          path: |
            modpack/*.mrpack
            modpack/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
