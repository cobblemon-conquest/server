name: Publish Modpack Release

on:
  push:
    branches:
      - main
    paths:
      - 'modpack/**'
      - 'resourcepack/**'

  pull_request:
    paths:
      - 'modpack/**'
      - 'resourcepack/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.check_version.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Packwiz
        run: |
          curl -L https://nightly.link/packwiz/packwiz/workflows/go/main/Linux%2064-bit%20x86.zip -o packwiz.zip
          unzip packwiz.zip
          chmod +x packwiz
          mv packwiz /usr/local/bin/
          rm packwiz.zip

      - name: Read version from pack.toml
        id: version
        working-directory: modpack
        run: |
          VERSION=$(grep -E '^version\s*=' pack.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version bump
        id: check_version
        working-directory: modpack
        run: |
          PREV_VERSION=$(git show HEAD~1:modpack/pack.toml 2>/dev/null | grep -E '^version\s*=' | sed -E 's/version\s*=\s*"([^"]+)"/\1/' || echo '')
          CURR_VERSION="${{ steps.version.outputs.version }}"
          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Export modpack
        working-directory: modpack
        run: |
          packwiz mr export && mv *.mrpack cobblemon-conquest_${{ steps.version.outputs.version }}_modrinth.mrpack
          packwiz curseforge export && mv *.zip cobblemon-conquest_${{ steps.version.outputs.version }}_curseforge.zip

      - name: Export update variants (without options.txt)
        working-directory: modpack
        run: |
          rm -f options.txt
          packwiz refresh
          packwiz mr export && mv *.mrpack cobblemon-conquest_${{ steps.version.outputs.version }}_update_modrinth.mrpack
          packwiz curseforge export && mv *.zip cobblemon-conquest_${{ steps.version.outputs.version }}_update_curseforge.zip

      - name: Upload modpack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-releases
          path: |
            modpack/*.mrpack
            modpack/*.zip

  merge-resourcepacks:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from pack.toml
        id: version
        working-directory: modpack
        run: |
          VERSION=$(grep -E '^version\s*=' pack.toml | sed -E 's/version\s*=\s*"([^"]+)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download and merge resourcepacks
        run: |
          mkdir -p merged/assets

          for toml in modpack/resourcepacks/*.pw.toml; do
            URL=$(grep -E '^\s*url\s*=' "$toml" | sed -E 's/.*url\s*=\s*"([^"]+)".*/\1/')

            if [ -z "$URL" ]; then
              echo "No URL found in $toml, skipping"
              continue
            fi

            echo "Downloading from $URL"
            TMPFILE=$(mktemp /tmp/rp-XXXXXX.zip)
            curl -fSL "$URL" -o "$TMPFILE"

            EXTRACT_DIR=$(mktemp -d)
            unzip -o "$TMPFILE" -d "$EXTRACT_DIR"

            if [ -d "$EXTRACT_DIR/assets" ]; then
              cp -r "$EXTRACT_DIR/assets/"* merged/assets/
            fi

            rm -f "$TMPFILE"
            rm -rf "$EXTRACT_DIR"
          done

      - name: Build combined resourcepack
        run: |
          cp resourcepack/* merged/
          cd merged
          zip -r "../cobblemon-conquest-resourcepack_${{ steps.version.outputs.version }}.zip" .

      - name: Upload resourcepack artifact
        uses: actions/upload-artifact@v4
        with:
          name: resourcepack
          path: cobblemon-conquest-resourcepack_*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build, merge-resourcepacks]
    if: github.ref == 'refs/heads/main' && needs.build.outputs.version_changed == 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
