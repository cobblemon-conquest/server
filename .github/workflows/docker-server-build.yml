name: Build server Docker image

on:
  push:
    branches:
      - main
    paths:
      - 'modpack/pack.toml'
  pull_request:
    paths:
      - 'modpack/**'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version bump
        id: check_version
        if: github.ref == 'refs/heads/main'
        working-directory: modpack
        run: |
          PREV_VERSION=$(git show HEAD~1:modpack/pack.toml 2>/dev/null | grep -E '^version\s*=' | sed -E 's/version\s*=\s*"([^"]+)"/\1/' || echo '')
          CURR_VERSION="${{ steps.version.outputs.version }}"
          echo "Previous version: $PREV_VERSION"
          echo "Current version:  $CURR_VERSION"
          echo "version=$CURR_VERSION" >> $GITHUB_OUTPUT
          if [ "$PREV_VERSION" != "$CURR_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Test image
        if: github.event_name == 'pull_request'
        run: |
          docker compose -f compose.yaml up --wait
          docker compose -f compose.yaml down

      - name: Build and push image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.server
          push: ${{ steps.check_version.outputs.changed }}
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/docker/cobblemon-conquest:latest
            ghcr.io/${{ github.repository_owner }}/docker/cobblemon-conquest:${{ steps.base.outputs.version }}
